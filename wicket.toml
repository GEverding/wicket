# Wicket Proxy Configuration
#
# This is the main configuration file for Wicket, a reverse proxy built on Pingora.
# See the documentation for full configuration options.

[server]
# Address and port to listen on
listen = "127.0.0.1:8080"

# Number of worker threads (defaults to number of CPUs)
# workers = 4

# Enable structured JSON logging (recommended for production)
json_logs = false

# Log level: trace, debug, info, warn, error
log_level = "info"

# Graceful shutdown timeout in seconds
shutdown_timeout = 30

# Optional file logging, useful for packaged installs and tailing like nginx.
# Defaults stay on stderr/journald unless enabled here.
# [logging]
# level = "info"
# format = "text" # text or json
#
# [logging.files]
# enabled = true
# directory = "/var/log/wicket"
# error = "error.log"
# access = "access.log"
# acme = "acme.log"
#
# [logging.access]
# enabled = true
# format = "combined" # combined or json

# ============================================================================
# Upstreams - Define your backend servers
# ============================================================================

[upstreams.backend]
# List of backend server addresses
backends = ["127.0.0.1:3000"]
# Load balancing strategy: round_robin or consistent_hash
strategy = "round_robin"

# Example with multiple backends and health checks:
# [upstreams.api]
# backends = ["127.0.0.1:3001", "127.0.0.1:3002", "127.0.0.1:3003"]
# strategy = "round_robin"
# [upstreams.api.health_check]
# path = "/health"
# interval = 10
# unhealthy_threshold = 3

# ============================================================================
# Routes - Define how requests are matched and routed
# ============================================================================

# Default route - matches all requests
[[routes]]
name = "default"
upstream = "backend"
[routes.match]
path_prefix = "/"

# Example: API route with host and method matching
# [[routes]]
# name = "api-v1"
# upstream = "api"
# [routes.match]
# host = "api.example.com"
# path_prefix = "/v1"
# methods = ["GET", "POST", "PUT", "DELETE"]

# ============================================================================
# Per-Route TLS (Multi-App with Auto TLS)
# ============================================================================
#
# Each route can specify its own TLS mode:
# - tls = "auto"                   : Auto-provision via ACME using default_dns
# - tls = { auto = "provider-name" }: Use a named DNS provider (for multi-account)
# - tls = { cert = "name" }        : Use a specific certificate by name
# - tls = "off"                    : Disable TLS for this route
#
# Example: Multiple apps with auto TLS (single Cloudflare account)
# [[routes]]
# name = "app1"
# upstream = "app1-backend"
# tls = "auto"
# [routes.match]
# host = "app1.example.com"
# path_prefix = "/"
#
# [[routes]]
# name = "app2"
# upstream = "app2-backend"
# tls = "auto"
# [routes.match]
# host = "app2.example.com"
# path_prefix = "/"
#
# When using per-route auto TLS, configure ACME with a default DNS provider:
# [tls]
# mode = "acme"
#
# [tls.acme]
# email = "admin@example.com"
# staging = true
#
# [tls.acme.default_dns]
# provider = "cloudflare"
# api_token = "${CF_API_TOKEN}"
#
# ============================================================================
# Multi-Provider TLS (Multiple Cloudflare Accounts)
# ============================================================================
#
# For apps hosted on different DNS zones managed by different Cloudflare
# accounts, define named DNS providers and reference them per-route:
#
# [[routes]]
# name = "acme-corp-app"
# upstream = "acme-backend"
# tls = { auto = "acme-corp" }     # Uses acme-corp's Cloudflare account
# [routes.match]
# host = "app.acme-corp.com"
# path_prefix = "/"
#
# [[routes]]
# name = "other-app"
# upstream = "other-backend"
# tls = { auto = "other-account" } # Uses other-account's Cloudflare account
# [routes.match]
# host = "app.other-company.com"
# path_prefix = "/"
#
# [[routes]]
# name = "default-app"
# upstream = "default-backend"
# tls = "auto"                     # Falls back to default_dns
# [routes.match]
# host = "app.mycompany.com"
# path_prefix = "/"
#
# [tls]
# mode = "acme"
#
# [tls.acme]
# email = "admin@mycompany.com"
# staging = true
#
# # Default DNS provider for routes with tls = "auto"
# [tls.acme.default_dns]
# provider = "cloudflare"
# api_token = "${CF_API_TOKEN_DEFAULT}"
#
# # Named providers for multi-account support
# [tls.acme.dns_providers.acme-corp]
# provider = "cloudflare"
# api_token = "${CF_API_TOKEN_ACME_CORP}"
# zone_id = "zone-acme-corp"  # Optional, auto-detected if not specified
#
# [tls.acme.dns_providers.other-account]
# provider = "cloudflare"
# api_token = "${CF_API_TOKEN_OTHER}"

# Example: Static files route
# [[routes]]
# name = "static"
# upstream = "static-server"
# [routes.match]
# path_prefix = "/static"

# Example: Wildcard host matching
# [[routes]]
# name = "tenant-api"
# upstream = "multi-tenant"
# [routes.match]
# host = "*.myapp.com"
# path_prefix = "/api"

# ============================================================================
# TLS Configuration (optional)
# ============================================================================
#
# Wicket supports three TLS modes:
# - "file": Static certificates loaded from disk with optional file watching
# - "acme": Automatic certificate provisioning via Let's Encrypt with DNS-01
# - "mixed": Both file-based and ACME certificates
#
# Example: File-based certificates (for Kubernetes cert-manager)
# [tls]
# mode = "file"
#
# [tls.file]
# watch = true
# poll_interval_secs = 30
#
# [[tls.file.certs]]
# name = "default"
# cert = "/etc/wicket/tls/tls.crt"
# key = "/etc/wicket/tls/tls.key"
# domains = ["example.com", "*.example.com"]
#
# Example: ACME certificates (for automatic Let's Encrypt)
# [tls]
# mode = "acme"
#
# [tls.acme]
# email = "admin@example.com"
# staging = true  # Use staging for testing (no rate limits)
# storage = "/var/lib/wicket/acme"
# renew_before_days = 30
#
# [[tls.acme.certs]]
# domains = ["example.com", "*.example.com"]
#
# [tls.acme.certs.dns]
# provider = "cloudflare"
# api_token = "${CF_API_TOKEN}"
# zone_id = "zone123"  # Optional, auto-detected if not specified
#
# Example: Mixed mode (both file and ACME)
# [tls]
# mode = "mixed"
#
# [tls.file]
# watch = true
#
# [[tls.file.certs]]
# name = "fallback"
# cert = "/etc/wicket/tls/fallback.crt"
# key = "/etc/wicket/tls/fallback.key"
# domains = ["example.com"]
#
# [tls.acme]
# email = "admin@example.com"
#
# [[tls.acme.certs]]
# domains = ["api.example.com"]
#
# [tls.acme.certs.dns]
# provider = "cloudflare"
# api_token = "${CF_API_TOKEN}"

# ============================================================================
# Stream (L4) Proxy Configuration (optional)
# ============================================================================
#
# Wicket supports L4 TCP stream proxying with SNI-based routing for TLS
# passthrough scenarios. This is useful for high-connection-count workloads
# (400k+ concurrent connections) where you need to preserve the original
# TLS connection to the backend.
#
# Example: Stream proxy with SNI routing
# [stream]
# listen = "0.0.0.0:8443"
# backlog = 8000
# reuseport = true
# proxy_protocol = "v2"
# source_ips = ["127.0.0.2", "127.0.0.3"]
# default_upstream = "echo-backend"
#
# [stream.sni_routes]
# "api.example.com" = "api-backend"
# "*.internal.com" = "internal-backend"
#
# [[stream.upstreams]]
# name = "echo-backend"
# servers = ["127.0.0.1:3001"]
#
# [[stream.upstreams]]
# name = "api-backend"
# servers = ["127.0.0.1:5443"]
#
# [[stream.upstreams]]
# name = "internal-backend"
# servers = ["127.0.0.1:6443"]
