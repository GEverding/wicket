---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: httproutes.gateway.networking.k8s.io
  annotations:
    api-approved.kubernetes.io: "https://github.com/kubernetes-sigs/gateway-api/pull/891"
spec:
  group: gateway.networking.k8s.io
  names:
    kind: HTTPRoute
    listKind: HTTPRouteList
    plural: httproutes
    singular: httproute
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Hostnames
          type: string
          jsonPath: .spec.hostnames
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                parentRefs:
                  type: array
                  maxItems: 32
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      group:
                        type: string
                        default: gateway.networking.k8s.io
                        maxLength: 253
                        pattern: ^$|^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                      kind:
                        type: string
                        default: Gateway
                        maxLength: 63
                        minLength: 1
                        pattern: ^[a-zA-Z]([-a-zA-Z0-9]*[a-zA-Z0-9])?$
                      name:
                        type: string
                        maxLength: 253
                        minLength: 1
                      namespace:
                        type: string
                        maxLength: 63
                        minLength: 1
                        pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                      sectionName:
                        type: string
                        maxLength: 253
                        minLength: 1
                        pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                      port:
                        type: integer
                        format: int32
                        minimum: 1
                        maximum: 65535
                hostnames:
                  type: array
                  maxItems: 16
                  items:
                    type: string
                    maxLength: 253
                    minLength: 1
                    pattern: ^(\*\.)?[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                rules:
                  type: array
                  maxItems: 16
                  default:
                    - matches:
                        - path:
                            type: PathPrefix
                            value: /
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        maxLength: 253
                        minLength: 1
                      matches:
                        type: array
                        maxItems: 8
                        items:
                          type: object
                          properties:
                            path:
                              type: object
                              properties:
                                type:
                                  type: string
                                  default: PathPrefix
                                  enum:
                                    - Exact
                                    - PathPrefix
                                    - RegularExpression
                                value:
                                  type: string
                                  default: /
                                  maxLength: 1024
                            headers:
                              type: array
                              maxItems: 16
                              items:
                                type: object
                                required:
                                  - name
                                  - value
                                properties:
                                  type:
                                    type: string
                                    default: Exact
                                    enum:
                                      - Exact
                                      - RegularExpression
                                  name:
                                    type: string
                                    maxLength: 256
                                    minLength: 1
                                    pattern: ^[A-Za-z0-9!#$%&'*+\-.^_\x60|~]+$
                                  value:
                                    type: string
                                    maxLength: 4096
                                    minLength: 1
                            queryParams:
                              type: array
                              maxItems: 16
                              items:
                                type: object
                                required:
                                  - name
                                  - value
                                properties:
                                  type:
                                    type: string
                                    default: Exact
                                    enum:
                                      - Exact
                                      - RegularExpression
                                  name:
                                    type: string
                                    maxLength: 256
                                    minLength: 1
                                  value:
                                    type: string
                                    maxLength: 1024
                                    minLength: 1
                            method:
                              type: string
                              enum:
                                - GET
                                - HEAD
                                - POST
                                - PUT
                                - DELETE
                                - CONNECT
                                - OPTIONS
                                - TRACE
                                - PATCH
                      filters:
                        type: array
                        maxItems: 16
                        items:
                          type: object
                          required:
                            - type
                          properties:
                            type:
                              type: string
                              enum:
                                - RequestHeaderModifier
                                - ResponseHeaderModifier
                                - RequestMirror
                                - RequestRedirect
                                - URLRewrite
                                - ExtensionRef
                            requestHeaderModifier:
                              type: object
                              properties:
                                set:
                                  type: array
                                  items:
                                    type: object
                                    required:
                                      - name
                                      - value
                                    properties:
                                      name:
                                        type: string
                                      value:
                                        type: string
                                add:
                                  type: array
                                  items:
                                    type: object
                                    required:
                                      - name
                                      - value
                                    properties:
                                      name:
                                        type: string
                                      value:
                                        type: string
                                remove:
                                  type: array
                                  items:
                                    type: string
                            responseHeaderModifier:
                              type: object
                              properties:
                                set:
                                  type: array
                                  items:
                                    type: object
                                    required:
                                      - name
                                      - value
                                    properties:
                                      name:
                                        type: string
                                      value:
                                        type: string
                                add:
                                  type: array
                                  items:
                                    type: object
                                    required:
                                      - name
                                      - value
                                    properties:
                                      name:
                                        type: string
                                      value:
                                        type: string
                                remove:
                                  type: array
                                  items:
                                    type: string
                            requestRedirect:
                              type: object
                              properties:
                                scheme:
                                  type: string
                                  enum:
                                    - http
                                    - https
                                hostname:
                                  type: string
                                path:
                                  type: object
                                  required:
                                    - type
                                  properties:
                                    type:
                                      type: string
                                      enum:
                                        - ReplaceFullPath
                                        - ReplacePrefixMatch
                                    replaceFullPath:
                                      type: string
                                    replacePrefixMatch:
                                      type: string
                                port:
                                  type: integer
                                  format: int32
                                statusCode:
                                  type: integer
                                  default: 302
                                  enum:
                                    - 301
                                    - 302
                            urlRewrite:
                              type: object
                              properties:
                                hostname:
                                  type: string
                                path:
                                  type: object
                                  required:
                                    - type
                                  properties:
                                    type:
                                      type: string
                                      enum:
                                        - ReplaceFullPath
                                        - ReplacePrefixMatch
                                    replaceFullPath:
                                      type: string
                                    replacePrefixMatch:
                                      type: string
                      backendRefs:
                        type: array
                        maxItems: 16
                        items:
                          type: object
                          required:
                            - name
                          properties:
                            group:
                              type: string
                              default: ""
                              maxLength: 253
                            kind:
                              type: string
                              default: Service
                              maxLength: 63
                              minLength: 1
                            name:
                              type: string
                              maxLength: 253
                              minLength: 1
                            namespace:
                              type: string
                              maxLength: 63
                              minLength: 1
                            port:
                              type: integer
                              format: int32
                              minimum: 1
                              maximum: 65535
                            weight:
                              type: integer
                              format: int32
                              default: 1
                              minimum: 0
                              maximum: 1000000
                            filters:
                              type: array
                              maxItems: 16
                              items:
                                type: object
                                required:
                                  - type
                                properties:
                                  type:
                                    type: string
                      timeouts:
                        type: object
                        properties:
                          request:
                            type: string
                            pattern: ^([0-9]{1,5}(h|m|s|ms)){1,4}$
                          backendRequest:
                            type: string
                            pattern: ^([0-9]{1,5}(h|m|s|ms)){1,4}$
            status:
              type: object
              properties:
                parents:
                  type: array
                  maxItems: 32
                  items:
                    type: object
                    required:
                      - controllerName
                      - parentRef
                    properties:
                      controllerName:
                        type: string
                        maxLength: 253
                        minLength: 1
                        pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*\/[A-Za-z0-9\/\-._~%!$&'()*+,;=:]+$
                      parentRef:
                        type: object
                        required:
                          - name
                        properties:
                          group:
                            type: string
                            default: gateway.networking.k8s.io
                          kind:
                            type: string
                            default: Gateway
                          name:
                            type: string
                          namespace:
                            type: string
                          sectionName:
                            type: string
                          port:
                            type: integer
                      conditions:
                        type: array
                        maxItems: 8
                        items:
                          type: object
                          required:
                            - lastTransitionTime
                            - message
                            - reason
                            - status
                            - type
                          properties:
                            lastTransitionTime:
                              type: string
                              format: date-time
                            message:
                              type: string
                            observedGeneration:
                              type: integer
                              format: int64
                            reason:
                              type: string
                            status:
                              type: string
                            type:
                              type: string
