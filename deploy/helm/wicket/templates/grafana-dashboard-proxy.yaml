{{- if .Values.monitoring.grafanaDashboards.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "wicket.fullname" . }}-grafana-proxy
  namespace: {{ include "wicket.namespace" . }}
  labels:
    {{- include "wicket.labels" . | nindent 4 }}
    grafana_dashboard: "1"
    {{- with .Values.monitoring.grafanaDashboards.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    grafana-folder: {{ .Values.monitoring.grafanaDashboards.folder | quote }}
data:
  wicket-proxy.json: |-
    {
      "annotations": { "list": [] },
      "description": "Wicket Proxy RED Metrics (Rate, Errors, Duration)",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Request Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "{{ .Values.monitoring.grafanaDashboards.datasource }}" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(wicket_http_requests_total[5m]))",
              "legendFormat": "Total RPS"
            },
            {
              "expr": "sum by (route) (rate(wicket_http_requests_total[5m]))",
              "legendFormat": "{{`{{ route }}`}}"
            }
          ]
        },
        {
          "title": "Error Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "{{ .Values.monitoring.grafanaDashboards.datasource }}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": { "drawStyle": "line", "fillOpacity": 10 },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 0.01, "color": "yellow" },
                  { "value": 0.05, "color": "red" }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(wicket_http_errors_total{error_type=\"server_error\"}[5m])) / sum(rate(wicket_http_requests_total[5m]))",
              "legendFormat": "5xx Rate"
            },
            {
              "expr": "sum(rate(wicket_http_errors_total{error_type=\"client_error\"}[5m])) / sum(rate(wicket_http_requests_total[5m]))",
              "legendFormat": "4xx Rate"
            }
          ]
        },
        {
          "title": "Request Duration (p50 / p95 / p99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "{{ .Values.monitoring.grafanaDashboards.datasource }}" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(wicket_http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(wicket_http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(wicket_http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p99"
            }
          ]
        },
        {
          "title": "Active Requests",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "{{ .Values.monitoring.grafanaDashboards.datasource }}" },
          "targets": [
            { "expr": "sum(wicket_http_requests_active)", "legendFormat": "Active" }
          ]
        },
        {
          "title": "Active Connections",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "{{ .Values.monitoring.grafanaDashboards.datasource }}" },
          "targets": [
            { "expr": "sum(wicket_client_connections_active)", "legendFormat": "Client" },
            { "expr": "sum(wicket_upstream_connections_active)", "legendFormat": "Upstream" }
          ]
        },
        {
          "title": "Healthy Backends",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "{{ .Values.monitoring.grafanaDashboards.datasource }}" },
          "targets": [
            { "expr": "sum by (upstream) (wicket_upstream_healthy_backends)", "legendFormat": "{{`{{ upstream }}`}}" }
          ]
        },
        {
          "title": "Config Reloads",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "{{ .Values.monitoring.grafanaDashboards.datasource }}" },
          "targets": [
            { "expr": "sum(rate(wicket_config_reloads_total{result=\"success\"}[5m]))", "legendFormat": "Success/s" },
            { "expr": "sum(rate(wicket_config_reloads_total{result=\"failure\"}[5m]))", "legendFormat": "Failure/s" }
          ]
        },
        {
          "title": "TLS Certificate Expiry",
          "type": "table",
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "{{ .Values.monitoring.grafanaDashboards.datasource }}" },
          "fieldConfig": {
            "defaults": { "unit": "s" }
          },
          "targets": [
            { "expr": "wicket_tls_certificate_expiry_timestamp_seconds - time()", "legendFormat": "{{`{{ domain }}`}}", "format": "table", "instant": true }
          ]
        },
        {
          "title": "Upstream Duration by Backend (p99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "{{ .Values.monitoring.grafanaDashboards.datasource }}" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum by (le, upstream) (rate(wicket_upstream_duration_seconds_bucket[5m])))",
              "legendFormat": "{{`{{ upstream }}`}}"
            }
          ]
        },
        {
          "title": "Time to First Byte (p50 / p99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "{{ .Values.monitoring.grafanaDashboards.datasource }}" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(wicket_time_to_first_byte_seconds_bucket[5m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(wicket_time_to_first_byte_seconds_bucket[5m])) by (le))",
              "legendFormat": "p99"
            }
          ]
        },
        {
          "title": "Bandwidth",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "{{ .Values.monitoring.grafanaDashboards.datasource }}" },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            }
          },
          "targets": [
            { "expr": "sum(rate(wicket_bytes_received_total[5m]))", "legendFormat": "Received" },
            { "expr": "sum(rate(wicket_bytes_sent_total[5m]))", "legendFormat": "Sent" }
          ]
        },
        {
          "title": "Upstream Errors by Type",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "{{ .Values.monitoring.grafanaDashboards.datasource }}" },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": { "drawStyle": "bars", "fillOpacity": 50 }
            }
          },
          "targets": [
            {
              "expr": "sum by (upstream, error_type) (rate(wicket_upstream_errors_total[5m]))",
              "legendFormat": "{{`{{ upstream }}`}} - {{`{{ error_type }}`}}"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["wicket", "proxy", "red"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Wicket Proxy - RED Metrics",
      "uid": "wicket-proxy-red"
    }
{{- end }}
