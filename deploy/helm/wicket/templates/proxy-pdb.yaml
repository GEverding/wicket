{{- if and .Values.proxy.enabled .Values.proxy.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "wicket.proxy.name" . }}
  namespace: {{ include "wicket.namespace" . }}
  labels:
    {{- include "wicket.proxy.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.proxy.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "wicket.proxy.selectorLabels" . | nindent 6 }}
{{- end }}
