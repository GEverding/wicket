{{- if .Values.monitoring.grafanaDashboards.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "wicket.fullname" . }}-grafana-stream
  namespace: {{ include "wicket.namespace" . }}
  labels:
    {{- include "wicket.labels" . | nindent 4 }}
    grafana_dashboard: "1"
    {{- with .Values.monitoring.grafanaDashboards.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    grafana-folder: {{ .Values.monitoring.grafanaDashboards.folder | quote }}
data:
  wicket-stream.json: |-
    {
      "annotations": { "list": [] },
      "description": "Wicket L4 stream proxy fleet and per-server metrics",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        { "title": "Stream Connection Rate", "type": "timeseries", "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 }, "datasource": { "type": "prometheus", "uid": "{{ .Values.monitoring.grafanaDashboards.datasource }}" }, "fieldConfig": { "defaults": { "unit": "cps", "custom": { "drawStyle": "line", "fillOpacity": 10 } } }, "targets": [ { "expr": "sum(rate(wicket_stream_connections_total{job=~\"$job\",instance=~\"$instance\"}[5m]))", "legendFormat": "fleet" }, { "expr": "sum by (instance) (rate(wicket_stream_connections_total{job=~\"$job\",instance=~\"$instance\"}[5m]))", "legendFormat": "{{`{{ instance }}`}}" }, { "expr": "sum by (upstream) (rate(wicket_stream_connections_total{job=~\"$job\",instance=~\"$instance\"}[5m]))", "legendFormat": "upstream {{`{{ upstream }}`}}" } ] },
        { "title": "Active Stream Connections", "type": "timeseries", "gridPos": { "h": 8, "w": 8, "x": 8, "y": 0 }, "datasource": { "type": "prometheus", "uid": "{{ .Values.monitoring.grafanaDashboards.datasource }}" }, "fieldConfig": { "defaults": { "unit": "short", "custom": { "drawStyle": "line", "fillOpacity": 10 } } }, "targets": [ { "expr": "sum(wicket_stream_connections_active{job=~\"$job\",instance=~\"$instance\"})", "legendFormat": "fleet" }, { "expr": "sum by (instance) (wicket_stream_connections_active{job=~\"$job\",instance=~\"$instance\"})", "legendFormat": "{{`{{ instance }}`}}" } ] },
        { "title": "Stream Connection Errors", "type": "timeseries", "gridPos": { "h": 8, "w": 8, "x": 16, "y": 0 }, "datasource": { "type": "prometheus", "uid": "{{ .Values.monitoring.grafanaDashboards.datasource }}" }, "fieldConfig": { "defaults": { "unit": "ops", "custom": { "drawStyle": "bars", "fillOpacity": 50 } } }, "targets": [ { "expr": "sum by (error_type) (rate(wicket_stream_connection_errors_total{job=~\"$job\",instance=~\"$instance\"}[5m]))", "legendFormat": "fleet {{`{{ error_type }}`}}" }, { "expr": "sum by (instance, error_type) (rate(wicket_stream_connection_errors_total{job=~\"$job\",instance=~\"$instance\"}[5m]))", "legendFormat": "{{`{{ instance }}`}} {{`{{ error_type }}`}}" } ] },
        { "title": "Connection Duration p95/p99", "type": "timeseries", "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 }, "datasource": { "type": "prometheus", "uid": "{{ .Values.monitoring.grafanaDashboards.datasource }}" }, "fieldConfig": { "defaults": { "unit": "s", "custom": { "drawStyle": "line", "fillOpacity": 10 } } }, "targets": [ { "expr": "histogram_quantile(0.95, sum(rate(wicket_stream_connection_duration_seconds_bucket{job=~\"$job\",instance=~\"$instance\"}[5m])) by (le))", "legendFormat": "fleet p95" }, { "expr": "histogram_quantile(0.99, sum(rate(wicket_stream_connection_duration_seconds_bucket{job=~\"$job\",instance=~\"$instance\"}[5m])) by (le))", "legendFormat": "fleet p99" }, { "expr": "histogram_quantile(0.99, sum by (le, instance) (rate(wicket_stream_connection_duration_seconds_bucket{job=~\"$job\",instance=~\"$instance\"}[5m])))", "legendFormat": "{{`{{ instance }}`}} p99" } ] },
        { "title": "Backend Connect Duration p95/p99", "type": "timeseries", "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 }, "datasource": { "type": "prometheus", "uid": "{{ .Values.monitoring.grafanaDashboards.datasource }}" }, "fieldConfig": { "defaults": { "unit": "s", "custom": { "drawStyle": "line", "fillOpacity": 10 } } }, "targets": [ { "expr": "histogram_quantile(0.95, sum by (le, upstream) (rate(wicket_stream_connect_duration_seconds_bucket{job=~\"$job\",instance=~\"$instance\"}[5m])))", "legendFormat": "{{`{{ upstream }}`}} p95" }, { "expr": "histogram_quantile(0.99, sum by (le, upstream) (rate(wicket_stream_connect_duration_seconds_bucket{job=~\"$job\",instance=~\"$instance\"}[5m])))", "legendFormat": "{{`{{ upstream }}`}} p99" } ] },
        { "title": "Stream Bandwidth", "type": "timeseries", "gridPos": { "h": 8, "w": 8, "x": 0, "y": 16 }, "datasource": { "type": "prometheus", "uid": "{{ .Values.monitoring.grafanaDashboards.datasource }}" }, "fieldConfig": { "defaults": { "unit": "Bps", "custom": { "drawStyle": "line", "fillOpacity": 10 } } }, "targets": [ { "expr": "sum by (direction) (rate(wicket_stream_bytes_total{job=~\"$job\",instance=~\"$instance\"}[5m]))", "legendFormat": "fleet {{`{{ direction }}`}}" }, { "expr": "sum by (instance, direction) (rate(wicket_stream_bytes_total{job=~\"$job\",instance=~\"$instance\"}[5m]))", "legendFormat": "{{`{{ instance }}`}} {{`{{ direction }}`}}" } ] },
        { "title": "SNI Extraction", "type": "timeseries", "gridPos": { "h": 8, "w": 8, "x": 8, "y": 16 }, "datasource": { "type": "prometheus", "uid": "{{ .Values.monitoring.grafanaDashboards.datasource }}" }, "fieldConfig": { "defaults": { "unit": "ops", "custom": { "drawStyle": "bars", "fillOpacity": 50 } } }, "targets": [ { "expr": "sum by (result) (rate(wicket_stream_sni_extractions_total{job=~\"$job\",instance=~\"$instance\"}[5m]))", "legendFormat": "fleet {{`{{ result }}`}}" }, { "expr": "sum by (instance, result) (rate(wicket_stream_sni_extractions_total{job=~\"$job\",instance=~\"$instance\"}[5m]))", "legendFormat": "{{`{{ instance }}`}} {{`{{ result }}`}}" } ] },
        { "title": "Upstream Health", "type": "timeseries", "gridPos": { "h": 8, "w": 8, "x": 16, "y": 16 }, "datasource": { "type": "prometheus", "uid": "{{ .Values.monitoring.grafanaDashboards.datasource }}" }, "fieldConfig": { "defaults": { "unit": "short", "custom": { "drawStyle": "line", "fillOpacity": 10 } } }, "targets": [ { "expr": "sum by (upstream) (wicket_stream_upstream_health{job=~\"$job\",instance=~\"$instance\"})", "legendFormat": "fleet {{`{{ upstream }}`}}" }, { "expr": "sum by (instance, upstream) (wicket_stream_upstream_health{job=~\"$job\",instance=~\"$instance\"})", "legendFormat": "{{`{{ instance }}`}} {{`{{ upstream }}`}}" } ] },
        { "title": "Proxy Path", "type": "timeseries", "gridPos": { "h": 8, "w": 24, "x": 0, "y": 24 }, "datasource": { "type": "prometheus", "uid": "{{ .Values.monitoring.grafanaDashboards.datasource }}" }, "fieldConfig": { "defaults": { "unit": "ops", "custom": { "drawStyle": "bars", "fillOpacity": 50 } } }, "targets": [ { "expr": "sum by (path) (rate(wicket_stream_proxy_path_total{job=~\"$job\",instance=~\"$instance\"}[5m]))", "legendFormat": "fleet {{`{{ path }}`}}" }, { "expr": "sum by (instance, path) (rate(wicket_stream_proxy_path_total{job=~\"$job\",instance=~\"$instance\"}[5m]))", "legendFormat": "{{`{{ instance }}`}} {{`{{ path }}`}}" } ] }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["wicket", "stream", "l4", "fleet"],
      "templating": { "list": [
        { "name": "job", "label": "Prometheus job", "type": "query", "datasource": { "type": "prometheus", "uid": "{{ .Values.monitoring.grafanaDashboards.datasource }}" }, "query": "label_values(wicket_stream_connections_total, job)", "refresh": 1, "includeAll": true, "allValue": ".*", "multi": true },
        { "name": "instance", "label": "Server instance", "type": "query", "datasource": { "type": "prometheus", "uid": "{{ .Values.monitoring.grafanaDashboards.datasource }}" }, "query": "label_values(wicket_stream_connections_total{job=~\"$job\"}, instance)", "refresh": 1, "includeAll": true, "allValue": ".*", "multi": true }
      ] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Wicket Stream - L4 Fleet",
      "uid": "wicket-stream-fleet",
      "version": 1,
      "weekStart": ""
    }
{{- end }}
