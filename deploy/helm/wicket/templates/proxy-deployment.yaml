{{- if .Values.proxy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wicket.proxy.name" . }}
  namespace: {{ include "wicket.namespace" . }}
  labels:
    {{- include "wicket.proxy.labels" . | nindent 4 }}
spec:
  {{- if not .Values.proxy.autoscaling.enabled }}
  replicas: {{ .Values.proxy.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "wicket.proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "wicket.proxy.selectorLabels" . | nindent 8 }}
        {{- with .Values.proxy.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/proxy-configmap.yaml") . | sha256sum }}
        {{- with .Values.proxy.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "wicket.proxy.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.proxy.securityContext | nindent 8 }}
      containers:
        - name: proxy
          image: {{ include "wicket.proxy.image" . }}
          imagePullPolicy: {{ .Values.proxy.image.pullPolicy }}
          args:
            - -c
            - /etc/wicket/wicket.toml
            {{- if .Values.proxy.config.jsonLogs }}
            - --json-logs
            {{- end }}
            - -l
            - {{ .Values.proxy.config.logLevel }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: https
              containerPort: 8443
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                # Give time for endpoints to be removed from Service before shutting down.
                # This ensures load balancers stop sending new traffic before we begin draining.
                command:
                  - /bin/sh
                  - -c
                  - sleep {{ .Values.proxy.lifecycle.preStopSleepSeconds | default 15 }}
          resources:
            {{- toYaml .Values.proxy.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.proxy.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/wicket
              readOnly: true
            - name: tls-certs
              mountPath: /etc/wicket/tls
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: {{ include "wicket.proxy.name" . }}-config
        - name: tls-certs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      {{- with .Values.proxy.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.proxy.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.proxy.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.proxy.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.proxy.priorityClassName }}
      priorityClassName: {{ .Values.proxy.priorityClassName }}
      {{- end }}
      # terminationGracePeriodSeconds should be > preStopSleepSeconds + shutdownTimeout
      # Default: 15s (preStop) + 30s (shutdown) + 5s (buffer) = 50s
      terminationGracePeriodSeconds: {{ .Values.proxy.terminationGracePeriodSeconds | default 50 }}
{{- end }}
