# Default values for Wicket Gateway API Controller

# Controller deployment
controller:
  image:
    repository: ghcr.io/geverding/wicket-controller
    tag: ""  # Defaults to Chart appVersion
    pullPolicy: IfNotPresent

  replicas: 1

  resources:
    limits:
      memory: 1024Mi
    requests:
      cpu: 100m
      memory: 256Mi

  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    seccompProfile:
      type: RuntimeDefault

  pod:
    annotations: {}
    labels: {}
    affinity: {}
    tolerations: []
    nodeSelector: {}

# Controller config
config:
  controllerName: gateway.wicket.dev/gatewayclass-controller
  logging:
    level: info

# Service for controller (metrics, health)
service:
  type: ClusterIP
  annotations: {}
  ports:
    - name: metrics
      port: 8081
      targetPort: 8081

# Install Gateway API CRDs
crds:
  install: true

# RBAC
rbac:
  create: true

createNamespace: false
